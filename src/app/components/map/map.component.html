<div class="map" [ngStyle]="backgroundStyle">
  @for (token of tokens; track token.id) {
    <img
      [src]="token.imageUrl"
      [alt]="token.name"
      [class]="token.type === 'boss' ? 'boss-icon' : 'placed-icon'"
      cdkDrag
      [cdkDragFreeDragPosition]="token.position"
      (cdkDragEnded)="onDragEnd($event, token)"
      (dblclick)="removeToken(token)"
    />
  }
</div>
